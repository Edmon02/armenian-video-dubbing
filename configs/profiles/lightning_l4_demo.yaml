# Lightning.ai L4 trial profile.
# Slightly less constrained than the Colab T4 profile while still favoring short-form reliability.

project:
  device: "cuda"
  dtype: "float16"

asr:
  backend: "whisper"
  whisper:
    model: "medium"
    model_path: "models/asr/whisper-medium"
    language: "hy"
    task: "transcribe"
    compute_type: "float16"
    batch_size: 6
    chunk_length_s: 20
    beam_size: 3

translation:
  model: "facebook/seamless-m4t-v2-large"
  model_path: "models/translation/seamless-m4t-v2-large"
  dtype: "float16"
  max_length: 256
  num_beams: 2

tts:
  backend: "edge-tts"
  fish_speech:
    reference_audio_seconds: 8
    chunk_length: 160

lipsync:
  enabled: false
  batch_size: 4
  face_det_batch_size: 2
  use_float16: true

audio:
  sample_rate: 32000
  loudness_target: -15.0
  demucs:
    enabled: false
    segment: 5.0
    overlap: 0.1
    shifts: 0

video:
  output_crf: 21
  output_preset: "faster"
  output_audio_bitrate: "160k"

timing:
  max_stretch_ratio: 1.2
  min_compress_ratio: 0.84
  method: "ffmpeg"

training:
  asr:
    epochs: 1
    learning_rate: 1.0e-4
    warmup_steps: 20
    batch_size: 4
    eval_batch_size: 4
    gradient_accumulation: 8
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    eval_steps: 25
    save_steps: 50
    fp16: true
    dataloader_workers: 2
  tts:
    epochs: 1
    learning_rate: 2.0e-5
    warmup_steps: 20
    batch_size: 1
    gradient_accumulation: 12
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    eval_steps: 20
    save_steps: 50
    fp16: true

inference:
  batch_video_max_concurrent: 1
  gpu_memory_fraction: 0.8
  enable_quantization: true
  quantization_bits: 4
  unload_models_after_stage: true
  max_input_video_sec: 45