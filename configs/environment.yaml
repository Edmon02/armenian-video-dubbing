# Armenian Video Dubbing AI - Conda Environment
# Requires: CUDA 12.4+, cuDNN 9.x, Python 3.11
name: armtts
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11.9
  - pytorch=2.5.1
  - torchvision=0.20.1
  - torchaudio=2.5.1
  - pytorch-cuda=12.4
  - pip
  - ffmpeg=7.1
  - sox
  - cmake
  - ninja
  - git-lfs
  - pip:
    # ASR
    - openai-whisper==20240930
    - faster-whisper==1.1.0
    - nemo_toolkit[asr]==2.1.0
    # Translation
    - transformers==4.48.1
    - seamless_communication==1.0.0
    - sentencepiece==0.2.0
    # TTS / Voice Cloning
    - fish-speech==2.0.0
    - gTTS==2.5.4
    # Audio Processing
    - demucs==4.0.1
    - librosa==0.10.2
    - soundfile==0.12.1
    - pydub==0.25.1
    - pyloudnorm==0.1.1
    - webrtcvad==2.0.10
    # Video / Lip-sync
    - opencv-python==4.10.0.84
    - face-alignment==1.4.1
    - mediapipe==0.10.18
    - decord==0.6.0
    # ML Utilities
    - accelerate==1.2.1
    - peft==0.14.0
    - bitsandbytes==0.45.0
    - datasets==3.2.0
    - evaluate==0.4.3
    - jiwer==3.1.0
    - wandb==0.19.1
    # Web UI / API
    - gradio==5.12.0
    - fastapi==0.115.6
    - uvicorn[standard]==0.34.0
    - python-multipart==0.0.20
    # Quality / Eval
    - pesq==0.0.4
    - pystoi==0.4.1
    - resemblyzer==0.1.3
    - unbabel-comet==2.2.4
    # Utilities
    - yt-dlp==2025.1.15
    - label-studio-sdk==1.0.5
    - tqdm==4.67.1
    - rich==13.9.4
    - loguru==0.7.3
    - click==8.1.7
    - pyyaml==6.0.2
    - python-dotenv==1.0.1
    - psutil==6.1.1
    - requests==2.32.3
    - aiohttp==3.11.11
    - tenacity==9.0.0
